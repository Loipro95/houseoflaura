<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura - Accueil</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .slide { width: 100%; background: #121212; padding: 30px; border-radius: 25px; border: 1px solid #333; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; width: 100%; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #444; }
        .btn { background: #ff007f; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 15px; }
        img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ACCUEIL -->
        <div class="slide" id="hub">
            <h1>HOUSE OF LAURA</h1>
            <div class="grid">
                <div class="card"><img src="cover hol.png"><a href="#page1" class="btn">Lire Tome 1</a></div>
                <div class="card"><img src="image_4a6112.jpg"><a href="tome2.html" class="btn">Lire Tome 2</a></div>
            </div>
        </div>
        <!-- TOME 1 (Exemple de structure) -->
        <div class="slide" id="page1"><img src="page 1 hol.png"><br><a href="#page2" class="btn">Suivant</a></div>
        <!-- ... ajoute tes pages 2 à 8 ici ... -->
        <div class="slide" id="page8">
            <img src="page 8 hol.png">
            <br><a href="tome2.html" class="btn">Lire Tome 2</a>
        </div>
    </div>
</body>
</html>
