<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura - Accueil</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; justify-content: center; }
        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card { width: 100%; background: #121212; padding: 40px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        h1 { color: #ff007f; font-size: 3em; margin-bottom: 10px; font-weight: 700; }
        p { font-size: 1.2em; color: #ccc; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; margin: 0 auto; }
        .btn { background: #ff007f; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: 0.3s; text-align: center; }
        .btn:hover { background: #ff3399; }
        .btn-discord { background: #5865F2; }
        .btn-discord:hover { background: #6f7cff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>House of Laura</h1>
            <p>Bienvenue sur le site officiel ! Choisissez votre tome ou rejoignez la communauté :</p>
            
            <div class="btn-group">
                <!-- Si tu as un fichier tome1.html, sinon tu pourras le créer plus tard -->
                <a href="tome1.html" class="btn">Lire le Tome 1</a>
                
                <!-- Lien vers ton fichier tome2.html -->
                <a href="tome2.html" class="btn">Lire le Tome 2</a>
                
                <!-- Lien direct vers ton Discord -->
                <a href="https://discord.gg/qj8JbVSZqQ" target="_blank" class="btn btn-discord">Rejoindre le Discord</a>
            </div>
        </div>
    </div>
</body>
</html>
